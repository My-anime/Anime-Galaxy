<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Anime Galaxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c16;
      color: #f0f2fa;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 30% 40%, #1a1f3a, #03050b 90%);
      z-index: -2;
    }
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        radial-gradient(2px 2px at 15% 25%, #ffffff80, transparent),
        radial-gradient(3px 3px at 72% 18%, #c4b5fd, transparent),
        radial-gradient(2px 2px at 88% 65%, #a78bfa90, transparent),
        radial-gradient(4px 4px at 33% 80%, #e0e7ff, transparent);
      z-index: -1;
      pointer-events: none;
    }
    .galaxy-header {
      padding: 1.5rem 1rem;
      background: rgba(15, 20, 40, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #2e3a6a;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c4b5fd, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }
    .nav-tab {
      padding: 12px 28px;
      background: rgba(30, 35, 60, 0.6);
      border: 1.5px solid #5b4caf;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
    }
    .nav-tab i { margin-right: 8px; }
    .nav-tab.active {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      border-color: #c3b4ff;
      box-shadow: 0 0 25px #7c3aed80;
    }
    .nav-tab:hover { background: #5b4caf; }
    .user-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
    }
    .btn {
      padding: 12px 26px;
      background: rgba(45, 35, 80, 0.8);
      backdrop-filter: blur(4px);
      border: 1.5px solid #7c6bc0;
      color: white;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      border-color: #a78bfa;
    }
    .btn:hover {
      background: #5b4caf;
      border-color: #c3b4ff;
      box-shadow: 0 0 20px #8b7bde;
      transform: translateY(-3px);
    }
    .user-info {
      display: inline-flex;
      align-items: center;
      background: rgba(30, 27, 75, 0.5);
      padding: 8px 22px;
      border-radius: 40px;
      border: 1px solid #5b4caf;
      backdrop-filter: blur(4px);
      gap: 10px;
    }
    .section-title {
      padding: 25px 25px 10px;
      font-size: 1.8rem;
      font-weight: 600;
    }
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 22px;
      padding: 20px 25px;
    }
    .anime-card {
      background: rgba(20, 25, 50, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 14px 12px;
      border: 1px solid #384072;
      position: relative;
      transition: all 0.3s;
    }
    .anime-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 22px 30px -10px #1e1b4b, 0 0 0 1px #8b7bde inset;
    }
    .anime-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid #4f4f9f;
    }
    .anime-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: #f5f0ff;
    }
    .anime-meta {
      font-size: 0.8rem;
      color: #c7c3ff;
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #dc2626;
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .anime-card:hover .delete-btn { display: flex; }
    .delete-btn:hover { background: #ef4444; }
    .add-form-container {
      max-width: 500px;
      margin: 20px auto;
      padding: 30px;
      background: rgba(20, 25, 50, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1.5px solid #5b4caf;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #c3b4ff;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      background: #0d1120;
      border: 1.5px solid #3a4270;
      border-radius: 14px;
      color: white;
      font-size: 1rem;
    }
    .preview-image {
      width: 150px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      border: 2px solid #5b4caf;
    }
    .page { display: none; }
    .page.active { display: block; }
    .auth-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      background: radial-gradient(circle at 30% 40%, #0b0e1ac0, #02040ac0);
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 35px 30px;
      background: rgba(15, 20, 45, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      border: 1.5px solid #a78bfa;
      box-shadow: 0 0 60px #7c3aed60, 0 20px 40px #00000080;
      position: relative;
      animation: floatGalaxy 0.4s ease;
    }
    @keyframes floatGalaxy {
      0% { opacity: 0; transform: scale(0.9) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header i {
      font-size: 3rem;
      color: #e9d5ff;
      filter: drop-shadow(0 0 20px #a78bfa);
      margin-bottom: 10px;
    }
    .auth-header h2 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #f0e6ff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .auth-input-group { margin-bottom: 20px; }
    .auth-input-group label {
      display: block;
      margin-bottom: 8px;
      color: #d0c4ff;
    }
    .auth-input {
      width: 100%;
      padding: 14px 18px;
      background: #0b0e1a;
      border: 2px solid #4f5a8c;
      border-radius: 20px;
      color: white;
      font-size: 1rem;
    }
    .auth-input:focus {
      border-color: #c4b5fd;
      box-shadow: 0 0 20px #7c3aed80;
      outline: none;
    }
    .auth-actions {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }
    .auth-actions .btn { flex: 1; justify-content: center; }
    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #b0a0e0;
      font-size: 24px;
      cursor: pointer;
    }
    .close-modal:hover { color: white; }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      color: #b0a0e0;
    }
    .auth-switch a {
      color: #c4b5fd;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
    .toast-msg {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b4be0;
      padding: 12px 28px;
      border-radius: 50px;
      border-left: 5px solid #a78bfa;
      z-index: 10000;
    }
    .loading-placeholder {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #b3b0d4;
    }
  </style>
</head>
<body>

<header class="galaxy-header">
  <h1>🌌 Anime Galaxy</h1>
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="catalog"><i class="fas fa-list"></i> Каталог</div>
    <div class="nav-tab" data-page="add"><i class="fas fa-plus-circle"></i> Добавить</div>
  </div>
  <div class="user-bar" id="authSection">
    <button class="btn" id="showLoginBtn"><i class="fas fa-sign-in-alt"></i> Войти</button>
    <button class="btn" id="showSignupBtn"><i class="fas fa-user-plus"></i> Регистрация</button>
  </div>
</header>

<main>
  <div class="page active" id="catalogPage">
    <div class="section-title"><i class="fas fa-fire" style="color:#f97316;"></i> Все аниме</div>
    <div class="anime-grid" id="animeList">
      <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
    </div>
  </div>
  <div class="page" id="addPage">
    <div class="section-title"><i class="fas fa-cloud-upload-alt" style="color:#a78bfa;"></i> Добавить аниме</div>
    <div class="add-form-container">
      <form id="addAnimeForm">
        <div class="form-group">
          <label><i class="fas fa-heading"></i> Название *</label>
          <input type="text" id="animeTitle" placeholder="Атака титанов" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-image"></i> Ссылка на постер *</label>
          <input type="url" id="animeImage" placeholder="https://..." required>
          <img class="preview-image" id="imagePreview" src="https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер" alt="Превью">
        </div>
        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Год</label>
          <input type="number" id="animeYear" placeholder="2024" min="1950" max="2030">
        </div>
        <div class="form-group">
          <label><i class="fas fa-tags"></i> Жанр</label>
          <input type="text" id="animeGenre" placeholder="Экшен, Фэнтези">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%"><i class="fas fa-upload"></i> Загрузить</button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function(){
    const SUPABASE_URL = "https://iviuuwynwfgfaqwtmfyp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ZR93peHGHF_brC1jzvsiPg_ZnSKFXwL";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    
    // Переключение вкладок
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(this.dataset.page + 'Page').classList.add('active');
      });
    });
    
    // Превью картинки
    const imageInput = document.getElementById('animeImage');
    const imagePreview = document.getElementById('imagePreview');
    imageInput.addEventListener('input', function() {
      imagePreview.src = this.value || 'https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер';
    });
    
    // Уведомления
    function showToast(msg, isError) {
      const toast = document.createElement('div');
      toast.className = 'toast-msg';
      toast.style.background = isError ? '#4a1e2eb3' : '#1e1b4be0';
      toast.innerHTML = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Загрузка аниме
    async function loadAnime() {
      const container = document.getElementById('animeList');
      container.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
      
      const { data, error } = await supabase.from('anime').select('*').order('id', { ascending: false });
      
      if (error) {
        container.innerHTML = '<div class="loading-placeholder">❌ Ошибка загрузки</div>';
        return;
      }
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading-placeholder">📭 Нет аниме. Добавьте первое!</div>';
        return;
      }
      
      container.innerHTML = data.map(a => `
        <div class="anime-card">
          <button class="delete-btn" data-id="${a.id}"><i class="fas fa-trash"></i></button>
          <img src="${a.image}" alt="${a.title}" onerror="this.src='https://via.placeholder.com/200x300/1a1f3a/a78bfa?text=Нет+фото'">
          <div class="anime-title">${a.title}</div>
          <div class="anime-meta">${a.year || '—'} • ${a.genre || '—'}</div>
        </div>
      `).join('');
      
      // Привязываем удаление
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          const id = this.dataset.id;
          if (confirm('Удалить аниме?')) {
            const { error } = await supabase.from('anime').delete().eq('id', id);
            if (error) showToast('Ошибка удаления', true);
            else { showToast('✅ Удалено!'); loadAnime(); }
          }
        });
      });
    }
    
    // Добавление аниме
    document.getElementById('addAnimeForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const title = document.getElementById('animeTitle').value.trim();
      const image = document.getElementById('animeImage').value.trim();
      const year = parseInt(document.getElementById('animeYear').value) || null;
      const genre = document.getElementById('animeGenre').value.trim() || null;
      
      if (!title || !image) {
        showToast('❌ Заполните название и ссылку на постер', true);
        return;
      }
      
      const { error } = await supabase.from('anime').insert([{ title, image, year, genre }]);
      
      if (error) {
        showToast('❌ Ошибка: ' + error.message, true);
      } else {
        showToast('✅ Аниме добавлено!');
        this.reset();
        imagePreview.src = 'https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер';
        document.querySelector('[data-page="catalog"]').click();
        loadAnime();
      }
    });
    
    // Функция показа модального окна
    function showAuthModal(type) {
      const existingModal = document.querySelector('.auth-modal');
      if (existingModal) existingModal.remove();
      
      const modal = document.createElement('div');
      modal.className = 'auth-modal';
      modal.innerHTML = `
        <div class="auth-card">
          <button class="close-modal"><i class="fas fa-times"></i></button>
          <div class="auth-header">
            <i class="fas fa-${type === 'login' ? 'sign-in-alt' : 'user-plus'}"></i>
            <h2>${type === 'login' ? 'Вход в галактику' : 'Регистрация'}</h2>
          </div>
          <form id="authForm">
            <div class="auth-input-group">
              <label><i class="fas fa-envelope"></i> Email</label>
              <input type="email" class="auth-input" id="authEmail" placeholder="your@email.com" required>
            </div>
            <div class="auth-input-group">
              <label><i class="fas fa-lock"></i> Пароль</label>
              <input type="password" class="auth-input" id="authPassword" placeholder="••••••••" required minlength="6">
            </div>
            <div class="auth-actions">
              <button type="submit" class="btn btn-primary">${type === 'login' ? 'Войти' : 'Зарегистрироваться'}</button>
            </div>
          </form>
          <div class="auth-switch">
            ${type === 'login' ? 'Нет аккаунта? <a class="switch-auth" data-type="signup">Регистрация</a>' : 'Уже есть аккаунт? <a class="switch-auth" data-type="login">Войти</a>'}
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      
      // Закрытие
      modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      
      // Переключение
      modal.querySelector('.switch-auth').addEventListener('click', function() {
        const newType = this.dataset.type;
        modal.remove();
        showAuthModal(newType);
      });
      
      // Отправка формы
      modal.querySelector('#authForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        
        if (type === 'login') {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) showToast('❌ Ошибка входа: ' + error.message, true);
          else { showToast('✅ Вход выполнен!'); modal.remove(); checkUser(); }
        } else {
          const { error } = await supabase.auth.signUp({ email, password });
          if (error) showToast('❌ Ошибка: ' + error.message, true);
          else { showToast('✅ Проверьте почту для подтверждения!'); modal.remove(); }
        }
      });
    }
    
    // Проверка пользователя
    async function checkUser() {
      const { data } = await supabase.auth.getSession();
      currentUser = data.session?.user || null;
      
      const authSection = document.getElementById('authSection');
      if (currentUser) {
        authSection.innerHTML = `
          <div class="user-info"><i class="fas fa-user-astronaut"></i> ${currentUser.email.split('@')[0]}</div>
          <button class="btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        `;
        document.getElementById('logoutBtn').addEventListener('click', async function() {
          await supabase.auth.signOut();
          showToast('👋 Вы вышли');
          checkUser();
        });
      } else {
        authSection.innerHTML = `
          <button class="btn" id="showLoginBtn"><i class="fas fa-sign-in-alt"></i> Войти</button>
          <button class="btn" id="showSignupBtn"><i class="fas fa-user-plus"></i> Регистрация</button>
        `;
        document.getElementById('showLoginBtn').addEventListener('click', () => showAuthModal('login'));
        document.getElementById('showSignupBtn').addEventListener('click', () => showAuthModal('signup'));
      }
    }
    
    // Привязка начальных кнопок
    document.getElementById('showLoginBtn').addEventListener('click', () => showAuthModal('login'));
    document.getElementById('showSignupBtn').addEventListener('click', () => showAuthModal('signup'));
    
    // Запуск
    checkUser();
    loadAnime();
  })();
</script>
</body>
</html>
