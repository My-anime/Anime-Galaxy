<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Anime Galaxy · Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0c16 0%, #1a1040 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    .debug-panel {
      background: #1a1a2e;
      border: 2px solid #7c3aed;
      border-radius: 15px;
      padding: 25px;
      margin: 20px auto;
      max-width: 800px;
    }
    h1 {
      color: #a78bfa;
      margin-bottom: 20px;
    }
    .status-item {
      padding: 10px;
      margin: 10px 0;
      background: #0f0f1a;
      border-radius: 8px;
      border-left: 4px solid #7c3aed;
    }
    .success { border-left-color: #10b981; }
    .error { border-left-color: #ef4444; }
    .warning { border-left-color: #f59e0b; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #9f5ef7; }
    pre {
      background: #00000050;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="debug-panel">
    <h1>🔍 Anime Galaxy · Диагностика</h1>
    
    <div id="status">
      <div class="status-item">⏳ Инициализация...</div>
    </div>

    <div style="margin-top: 20px;">
      <button onclick="testConnection()">🔄 Проверить подключение</button>
      <button onclick="testAuth()">🔑 Тест авторизации</button>
      <button onclick="createAnimeTable()">📋 Создать таблицу anime</button>
    </div>

    <div id="results" style="margin-top: 20px;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://iviuuwynwfgfaqwtmfyp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ZR93peHGHF_brC1jzvsiPg_ZnSKFXwL";
    
    let supabase;
    const statusDiv = document.getElementById('status');
    const resultsDiv = document.getElementById('results');
    
    function addStatus(message, type = 'info') {
      const className = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
      statusDiv.innerHTML = `<div class="status-item ${className}">${message}</div>`;
    }
    
    function addResult(title, data) {
      resultsDiv.innerHTML = `
        <h3>${title}</h3>
        <pre>${JSON.stringify(data, null, 2)}</pre>
      ` + resultsDiv.innerHTML;
    }
    
    // Инициализация Supabase
    try {
      supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      addStatus('✅ Supabase JS загружен', 'success');
    } catch(e) {
      addStatus(`❌ Ошибка загрузки Supabase: ${e.message}`, 'error');
    }
    
    async function testConnection() {
      addStatus('🔄 Проверка подключения к Supabase...');
      
      try {
        // Проверяем, существует ли таблица anime
        const { data, error, status } = await supabase
          .from('anime')
          .select('*')
          .limit(1);
        
        addResult('Результат запроса:', { data, error, status });
        
        if (error) {
          if (error.code === '42P01') {
            addStatus('❌ Таблица "anime" не существует! Нажмите "Создать таблицу anime"', 'error');
          } else if (error.message.includes('JWT')) {
            addStatus('❌ Ошибка авторизации. Проверьте RLS политики', 'error');
          } else {
            addStatus(`❌ Ошибка: ${error.message}`, 'error');
          }
        } else if (data) {
          addStatus(`✅ Подключение успешно! Найдено записей: ${data.length}`, 'success');
        }
      } catch(e) {
        addStatus(`❌ Исключение: ${e.message}`, 'error');
        addResult('Ошибка:', e);
      }
    }
    
    async function testAuth() {
      addStatus('🔄 Проверка авторизации...');
      
      try {
        const { data, error } = await supabase.auth.getSession();
        addResult('Сессия:', { session: data.session, error });
        
        if (data.session) {
          addStatus(`✅ Пользователь авторизован: ${data.session.user.email}`, 'success');
        } else {
          addStatus('ℹ️ Нет активной сессии (это нормально)', 'warning');
        }
      } catch(e) {
        addStatus(`❌ Ошибка: ${e.message}`, 'error');
      }
    }
    
    async function createAnimeTable() {
      addStatus('🔄 Попытка создать таблицу anime...');
      
      // Пробуем вставить тестовую запись (таблица создастся автоматически если разрешено)
      try {
        const { data, error } = await supabase
          .from('anime')
          .insert([{
            title: 'Тестовое аниме',
            image: 'https://via.placeholder.com/200x300',
            year: 2024,
            genre: 'Тест'
          }])
          .select();
        
        addResult('Результат вставки:', { data, error });
        
        if (error) {
          if (error.message.includes('permission denied')) {
            addStatus('❌ Нет прав на создание записей. Нужно настроить RLS в Supabase', 'error');
            showRLSHelp();
          } else {
            addStatus(`❌ Ошибка: ${error.message}`, 'error');
          }
        } else {
          addStatus('✅ Тестовое аниме добавлено! Таблица существует.', 'success');
        }
      } catch(e) {
        addStatus(`❌ Ошибка: ${e.message}`, 'error');
      }
    }
    
    function showRLSHelp() {
      resultsDiv.innerHTML = `
        <div style="background: #1e1b4b; padding: 20px; border-radius: 10px; margin-top: 20px;">
          <h3>📋 Как настроить RLS в Supabase:</h3>
          <ol style="margin-left: 20px; line-height: 2;">
            <li>Зайдите в Supabase Dashboard</li>
            <li>Выберите "Table Editor" → таблица "anime"</li>
            <li>Нажмите "Edit" (карандаш справа)</li>
            <li>Вкладка "Policies" → "New Policy"</li>
            <li>Выберите шаблон: "Enable read access to everyone"</li>
            <li>Создайте ещё одну: "Enable insert for authenticated users only"</li>
            <li>Сохраните и обновите страницу</li>
          </ol>
        </div>
      ` + resultsDiv.innerHTML;
    }
    
    // Автозапуск при загрузке
    setTimeout(() => {
      testConnection();
      testAuth();
    }, 500);
  </script>
</body>
</html>
