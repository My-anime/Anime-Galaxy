<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Anime Galaxy · Твой мир аниме</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c16;
      color: #f0f2fa;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 30% 40%, #1a1f3a, #03050b 90%);
      z-index: -2;
    }
    .galaxy-header {
      padding: 1.5rem 1rem;
      background: rgba(15, 20, 40, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #2e3a6a;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c4b5fd, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }
    .nav-tab {
      padding: 10px 24px;
      background: rgba(30, 35, 60, 0.6);
      border: 1px solid #5b4caf;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }
    .nav-tab.active {
      background: #7c3aed;
      border-color: #a78bfa;
      box-shadow: 0 0 15px #7c3aed;
    }
    .nav-tab:hover { background: #5b4caf; }
    .user-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 22px;
      background: rgba(45, 35, 80, 0.8);
      border: 1.5px solid #7c6bc0;
      color: white;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: #7c3aed;
      border-color: #a78bfa;
    }
    .btn:hover {
      background: #5b4caf;
      transform: translateY(-2px);
    }
    .section-title {
      padding: 25px 25px 10px;
      font-size: 1.8rem;
      font-weight: 600;
    }
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 22px;
      padding: 20px 25px;
    }
    .anime-card {
      background: rgba(20, 25, 50, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 14px 12px;
      border: 1px solid #384072;
      position: relative;
    }
    .anime-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid #4f4f9f;
    }
    .anime-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: #f5f0ff;
    }
    .anime-meta {
      font-size: 0.8rem;
      color: #c7c3ff;
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #dc2626;
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .anime-card:hover .delete-btn { display: flex; }
    .delete-btn:hover { background: #ef4444; }
    .add-form-container {
      max-width: 500px;
      margin: 20px auto;
      padding: 30px;
      background: rgba(20, 25, 50, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1.5px solid #5b4caf;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #c3b4ff;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      background: #0d1120;
      border: 1.5px solid #3a4270;
      border-radius: 14px;
      color: white;
      font-size: 1rem;
    }
    .preview-image {
      width: 150px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      border: 2px solid #5b4caf;
    }
    .page { display: none; }
    .page.active { display: block; }
    .toast-msg {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b4be0;
      padding: 12px 28px;
      border-radius: 50px;
      border-left: 5px solid #a78bfa;
      z-index: 10000;
    }
    .loading-placeholder {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #b3b0d4;
    }
  </style>
</head>
<body>

<header class="galaxy-header">
  <h1>🌌 Anime Galaxy</h1>
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="catalog">📋 Каталог</div>
    <div class="nav-tab" data-page="add">➕ Добавить</div>
  </div>
  <div class="user-bar" id="authSection">
    <button class="btn" id="loginBtn">🔑 Войти</button>
    <button class="btn" id="signupBtn">📝 Регистрация</button>
  </div>
</header>

<main>
  <div class="page active" id="catalogPage">
    <div class="section-title">🔥 Все аниме</div>
    <div class="anime-grid" id="animeList">
      <div class="loading-placeholder">Загрузка...</div>
    </div>
  </div>

  <div class="page" id="addPage">
    <div class="section-title">📤 Добавить аниме</div>
    <div class="add-form-container">
      <form id="addAnimeForm">
        <div class="form-group">
          <label>Название *</label>
          <input type="text" id="animeTitle" placeholder="Атака титанов" required>
        </div>
        <div class="form-group">
          <label>Ссылка на постер *</label>
          <input type="url" id="animeImage" placeholder="https://..." required>
          <img class="preview-image" id="imagePreview" src="https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер">
        </div>
        <div class="form-group">
          <label>Год</label>
          <input type="number" id="animeYear" placeholder="2024" min="1950" max="2030">
        </div>
        <div class="form-group">
          <label>Жанр</label>
          <input type="text" id="animeGenre" placeholder="Экшен, Фэнтези">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">📤 Загрузить</button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function(){
    const SUPABASE_URL = "https://iviuuwynwfgfaqwtmfyp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ZR93peHGHF_brC1jzvsiPg_ZnSKFXwL";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Переключение вкладок
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(this.dataset.page + 'Page').classList.add('active');
      });
    });
    
    // Превью картинки
    document.getElementById('animeImage').addEventListener('input', function() {
      document.getElementById('imagePreview').src = this.value || 'https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер';
    });
    
    // Уведомления
    function showToast(msg, isError) {
      const toast = document.createElement('div');
      toast.className = 'toast-msg';
      toast.style.background = isError ? '#4a1e2eb3' : '#1e1b4be0';
      toast.innerHTML = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Загрузка аниме
    async function loadAnime() {
      const container = document.getElementById('animeList');
      container.innerHTML = '<div class="loading-placeholder">Загрузка...</div>';
      
      const { data, error } = await supabase.from('anime').select('*').order('id', { ascending: false });
      
      if (error) {
        container.innerHTML = '<div class="loading-placeholder">Ошибка загрузки</div>';
        return;
      }
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading-placeholder">Нет аниме. Добавьте первое!</div>';
        return;
      }
      
      container.innerHTML = data.map(a => `
        <div class="anime-card">
          <button class="delete-btn" data-id="${a.id}">🗑️</button>
          <img src="${a.image}" alt="${a.title}">
          <div class="anime-title">${a.title}</div>
          <div class="anime-meta">${a.year || '—'} • ${a.genre || '—'}</div>
        </div>
      `).join('');
      
      // Привязываем удаление
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async function(e) {
          e.stopPropagation();
          const id = this.dataset.id;
          if (confirm('Удалить аниме?')) {
            const { error } = await supabase.from('anime').delete().eq('id', id);
            if (error) showToast('Ошибка удаления', true);
            else { showToast('Удалено!'); loadAnime(); }
          }
        });
      });
    }
    
    // Добавление аниме
    document.getElementById('addAnimeForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const newAnime = {
        title: document.getElementById('animeTitle').value,
        image: document.getElementById('animeImage').value,
        year: parseInt(document.getElementById('animeYear').value) || null,
        genre: document.getElementById('animeGenre').value || null
      };
      
      const { error } = await supabase.from('anime').insert([newAnime]);
      
      if (error) {
        showToast('Ошибка: ' + error.message, true);
      } else {
        showToast('✅ Аниме добавлено!');
        this.reset();
        document.getElementById('imagePreview').src = 'https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер';
        document.querySelector('[data-page="catalog"]').click();
        loadAnime();
      }
    });
    
    // Авторизация
    document.getElementById('loginBtn').addEventListener('click', async function() {
      const email = prompt('Email:');
      const pass = prompt('Пароль:');
      if (!email || !pass) return;
      const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) showToast('Ошибка входа', true);
      else showToast('✅ Вход выполнен!');
    });
    
    document.getElementById('signupBtn').addEventListener('click', async function() {
      const email = prompt('Email:');
      const pass = prompt('Пароль (мин 6 символов):');
      if (!email || !pass) return;
      const { error } = await supabase.auth.signUp({ email, password: pass });
      if (error) showToast('Ошибка регистрации', true);
      else showToast('✅ Проверьте почту!');
    });
    
    // Загрузка при старте
    loadAnime();
  })();
</script>
</body>
</html>
