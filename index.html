<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Anime Galaxy · Debug FIX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0c16 0%, #1a1040 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    .debug-panel {
      background: #1a1a2e;
      border: 2px solid #7c3aed;
      border-radius: 15px;
      padding: 25px;
      margin: 20px auto;
      max-width: 800px;
    }
    h1 { color: #a78bfa; margin-bottom: 20px; }
    .status-item {
      padding: 10px;
      margin: 10px 0;
      background: #0f0f1a;
      border-radius: 8px;
      border-left: 4px solid #7c3aed;
    }
    .success { border-left-color: #10b981; }
    .error { border-left-color: #ef4444; }
    .warning { border-left-color: #f59e0b; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #9f5ef7; }
    pre {
      background: #00000050;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="debug-panel">
    <h1>🔍 Anime Galaxy · Диагностика (ИСПРАВЛЕНО)</h1>
    
    <div id="status">
      <div class="status-item">⏳ Загрузка...</div>
    </div>

    <div style="margin-top: 20px;">
      <button id="testConnectionBtn">🔄 Проверить подключение</button>
      <button id="testAuthBtn">🔑 Тест авторизации</button>
      <button id="createTableBtn">📋 Создать таблицу anime</button>
    </div>

    <div id="results" style="margin-top: 20px;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = "https://iviuuwynwfgfaqwtmfyp.supabase.co";
      const SUPABASE_KEY = "sb_publishable_ZR93peHGHF_brC1jzvsiPg_ZnSKFXwL";
      
      let supabase;
      const statusDiv = document.getElementById('status');
      const resultsDiv = document.getElementById('results');
      
      function addStatus(message, type) {
        type = type || 'info';
        var className = '';
        if (type === 'success') className = 'success';
        else if (type === 'error') className = 'error';
        else if (type === 'warning') className = 'warning';
        statusDiv.innerHTML = '<div class="status-item ' + className + '">' + message + '</div>';
      }
      
      function addResult(title, data) {
        resultsDiv.innerHTML = '<h3>' + title + '</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>' + resultsDiv.innerHTML;
      }
      
      // Инициализация
      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        addStatus('✅ Supabase загружен! Нажмите кнопку.', 'success');
        console.log('Supabase initialized');
      } catch(e) {
        addStatus('❌ Ошибка: ' + e.message, 'error');
        console.error(e);
      }
      
      // Привязка кнопок
      document.getElementById('testConnectionBtn').onclick = async function() {
        addStatus('🔄 Проверка подключения...');
        try {
          const result = await supabase.from('anime').select('*').limit(1);
          addResult('Результат запроса:', result);
          
          if (result.error) {
            if (result.error.code === '42P01') {
              addStatus('❌ Таблица "anime" не существует!', 'error');
            } else {
              addStatus('❌ Ошибка: ' + result.error.message, 'error');
            }
          } else {
            addStatus('✅ Подключение успешно! Записей: ' + (result.data ? result.data.length : 0), 'success');
          }
        } catch(e) {
          addStatus('❌ Исключение: ' + e.message, 'error');
        }
      };
      
      document.getElementById('testAuthBtn').onclick = async function() {
        addStatus('🔄 Проверка сессии...');
        try {
          const result = await supabase.auth.getSession();
          addResult('Сессия:', result);
          if (result.data.session) {
            addStatus('✅ Пользователь: ' + result.data.session.user.email, 'success');
          } else {
            addStatus('ℹ️ Нет активной сессии', 'warning');
          }
        } catch(e) {
          addStatus('❌ Ошибка: ' + e.message, 'error');
        }
      };
      
      document.getElementById('createTableBtn').onclick = async function() {
        addStatus('🔄 Создание записи...');
        try {
          const result = await supabase.from('anime').insert([{
            title: 'Тестовое аниме ' + new Date().toLocaleTimeString(),
            image: 'https://via.placeholder.com/200x300',
            year: 2024,
            genre: 'Тест'
          }]).select();
          
          addResult('Результат вставки:', result);
          
          if (result.error) {
            addStatus('❌ Ошибка: ' + result.error.message, 'error');
          } else {
            addStatus('✅ Аниме добавлено!', 'success');
          }
        } catch(e) {
          addStatus('❌ Исключение: ' + e.message, 'error');
        }
      };
      
      console.log('Страница готова, кнопки привязаны');
    })();
  </script>
</body>
</html>
