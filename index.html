<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Anime Galaxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0c16 0%, #1a1040 100%);
      color: white;
      min-height: 100vh;
    }
    header {
      padding: 30px;
      text-align: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #7c3aed;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #c4b5fd, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
      text-align: center;
    }
    .btn {
      padding: 12px 24px;
      background: #7c3aed;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }
    .btn:hover {
      background: #9f5ef7;
      transform: scale(1.05);
    }
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .anime-card {
      background: rgba(30, 20, 50, 0.8);
      backdrop-filter: blur(5px);
      padding: 15px;
      border-radius: 15px;
      border: 1px solid #5b4caf;
    }
    .anime-card img {
      width: 100%;
      border-radius: 10px;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      background: rgba(124, 58, 237, 0.2);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌌 Anime Galaxy</h1>
    <p>Ваш портал в мир аниме</p>
  </header>

  <div class="container">
    <div>
      <button class="btn" onclick="login()">🔑 Войти</button>
      <button class="btn" onclick="register()">📝 Регистрация</button>
    </div>

    <div class="status" id="status">
      Загрузка...
    </div>

    <div class="anime-grid" id="animeList">
      <!-- Аниме появятся здесь -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://iviuuwynwfgfaqwtmfyp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ZR93peHGHF_brC1jzvsiPg_ZnSKFXwL";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Проверка подключения
    async function checkConnection() {
      const statusEl = document.getElementById('status');
      
      try {
        const { data, error } = await supabase.from('anime').select('*').limit(5);
        
        if (error) {
          statusEl.innerHTML = `❌ Ошибка подключения: ${error.message}`;
          console.error('Supabase error:', error);
        } else if (data) {
          statusEl.innerHTML = `✅ Подключено к Supabase! Найдено аниме: ${data.length}`;
          loadAnime();
        } else {
          statusEl.innerHTML = `⚠️ Подключено, но таблица 'anime' пуста`;
        }
      } catch (e) {
        statusEl.innerHTML = `❌ Ошибка: ${e.message}`;
        console.error('Connection error:', e);
      }
    }
    
    async function loadAnime() {
      const { data } = await supabase.from('anime').select('*');
      const container = document.getElementById('animeList');
      
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="grid-column:1/-1">Нет аниме. Добавьте первое!</p>';
        return;
      }
      
      container.innerHTML = data.map(a => `
        <div class="anime-card">
          <img src="${a.image || 'https://via.placeholder.com/200x300'}" alt="${a.title}">
          <h3>${a.title}</h3>
          <p>${a.year || ''} • ${a.genre || ''}</p>
        </div>
      `).join('');
    }
    
    async function login() {
      const email = prompt('Email:');
      const pass = prompt('Пароль:');
      if (!email || !pass) return;
      
      const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) alert('Ошибка: ' + error.message);
      else alert('✅ Вход успешен!');
    }
    
    async function register() {
      const email = prompt('Email:');
      const pass = prompt('Пароль (мин 6 символов):');
      if (!email || !pass) return;
      
      const { error } = await supabase.auth.signUp({ email, password: pass });
      if (error) alert('Ошибка: ' + error.message);
      else alert('✅ Проверьте почту для подтверждения!');
    }
    
    // Запуск
    checkConnection();
  </script>
</body>
</html>
