<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Anime Galaxy · Загрузка аниме</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c16;
      color: #f0f2fa;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 30% 40%, #1a1f3a, #03050b 90%);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        radial-gradient(3px 3px at 20% 30%, #ffffff30, transparent),
        radial-gradient(2px 2px at 80% 70%, #a78bfa40, transparent),
        radial-gradient(4px 4px at 40% 80%, #7c6bc050, transparent);
      z-index: -1;
      pointer-events: none;
    }

    /* Шапка */
    .galaxy-header {
      padding: 1.5rem 1rem;
      background: rgba(15, 20, 40, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #2e3a6a;
      box-shadow: 0 10px 30px -10px #00000080;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #c4b5fd, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .nav-tab {
      padding: 10px 24px;
      background: rgba(30, 35, 60, 0.6);
      border: 1px solid #5b4caf;
      color: white;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav-tab.active {
      background: #7c3aed;
      border-color: #a78bfa;
      box-shadow: 0 0 15px #7c3aed;
    }

    .nav-tab:hover {
      background: #5b4caf;
    }

    /* Панель авторизации */
    .user-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      background: rgba(45, 35, 80, 0.8);
      backdrop-filter: blur(4px);
      border: 1.5px solid #7c6bc0;
      color: white;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #7c3aed;
      border-color: #a78bfa;
    }

    .btn-primary:hover {
      background: #9f5ef7;
      box-shadow: 0 0 18px #8b7bde;
      transform: translateY(-2px);
    }

    .btn:hover {
      background: #5b4caf;
      border-color: #c3b4ff;
      box-shadow: 0 0 18px #8b7bde;
      transform: translateY(-2px);
    }

    .user-info {
      display: inline-flex;
      align-items: center;
      background: #1e1b4b60;
      padding: 5px 18px;
      border-radius: 40px;
      border: 1px solid #5b4caf;
      backdrop-filter: blur(4px);
      gap: 8px;
    }

    /* Контент */
    .section-title {
      padding: 25px 25px 10px;
      font-size: 1.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Форма добавления аниме */
    .add-form-container {
      max-width: 600px;
      margin: 20px auto;
      padding: 30px;
      background: rgba(20, 25, 50, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1.5px solid #5b4caf;
      box-shadow: 0 20px 40px #00000060;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #c3b4ff;
      font-weight: 500;
    }

    .form-group label i {
      margin-right: 8px;
      width: 20px;
      color: #a78bfa;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: #0d1120;
      border: 1.5px solid #3a4270;
      border-radius: 14px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 10px #7c3aed60;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-hint {
      font-size: 0.8rem;
      color: #9a9ac0;
      margin-top: 5px;
    }

    .preview-image {
      width: 150px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      border: 2px solid #5b4caf;
      background: #0d1120;
    }

    /* Сетка аниме */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 22px;
      padding: 20px 25px;
    }

    .anime-card {
      background: rgba(20, 25, 50, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 14px 12px 16px;
      border: 1px solid #384072;
      box-shadow: 0 15px 25px -12px #00000080;
      transition: all 0.25s;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .anime-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 22px 30px -10px #1e1b4b, 0 0 0 1px #8b7bde inset;
      border-color: #b1a1f0;
    }

    .anime-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 14px #00000050;
      border: 1px solid #4f4f9f;
      background: #0f1322;
    }

    .anime-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin: 6px 0 4px;
      color: #f5f0ff;
    }

    .anime-meta {
      font-size: 0.8rem;
      opacity: 0.8;
      color: #c7c3ff;
      display: flex;
      justify-content: space-between;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #dc2626;
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 4px 10px #00000080;
      transition: 0.2s;
    }

    .anime-card:hover .delete-btn {
      display: flex;
    }

    .delete-btn:hover {
      background: #ef4444;
      transform: scale(1.1);
    }

    /* Страницы */
    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* Уведомления */
    .toast-msg {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b4be0;
      backdrop-filter: blur(12px);
      padding: 12px 28px;
      border-radius: 50px;
      border-left: 5px solid #a78bfa;
      box-shadow: 0 15px 30px #00000070;
      z-index: 10000;
    }

    .loading-placeholder {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #b3b0d4;
      font-size: 1.2rem;
    }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: #9a9ac0;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .anime-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .add-form-container { margin: 20px 15px; padding: 20px; }
    }
  </style>
</head>
<body>

<header class="galaxy-header">
  <h1>
    <i class="fas fa-galaxy"></i> 
    Anime Galaxy
    <i class="fas fa-cloud-upload-alt" style="color: #a78bfa;"></i>
  </h1>
  
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="catalog"><i class="fas fa-list"></i> Каталог</div>
    <div class="nav-tab" data-page="add"><i class="fas fa-plus-circle"></i> Добавить аниме</div>
  </div>

  <div class="user-bar" id="authSection">
    <!-- динамически -->
  </div>
</header>

<main>
  <!-- Страница КАТАЛОГ -->
  <div class="page active" id="catalogPage">
    <div class="section-title">
      <i class="fas fa-fire" style="color: #f97316;"></i> 
      Все аниме
      <span style="margin-left: auto; font-size: 0.9rem;" id="userGreeting"></span>
    </div>
    <div class="anime-grid" id="animeList">
      <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
    </div>
  </div>

  <!-- Страница ДОБАВЛЕНИЯ -->
  <div class="page" id="addPage">
    <div class="section-title">
      <i class="fas fa-cloud-upload-alt" style="color: #a78bfa;"></i>
      Загрузить новое аниме
    </div>
    
    <div class="add-form-container">
      <form id="addAnimeForm">
        <div class="form-group">
          <label><i class="fas fa-heading"></i> Название *</label>
          <input type="text" id="animeTitle" placeholder="Например: Атака титанов" required>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-image"></i> Ссылка на постер *</label>
          <input type="url" id="animeImage" placeholder="https://..." required>
          <div class="form-hint">Вставьте прямую ссылку на картинку (jpg, png)</div>
          <img class="preview-image" id="imagePreview" src="https://via.placeholder.com/150x200/1a1f3a/a78bfa?text=Постер" alt="Превью">
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Год выхода</label>
          <input type="number" id="animeYear" placeholder="2024" min="1950" max="2030">
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-tags"></i> Жанр</label>
          <input type="text" id="animeGenre" placeholder="Экшен, Фэнтези, Драма">
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-align-left"></i> Описание</label>
          <textarea id="animeDescription" placeholder="Краткое описание сюжета..."></textarea>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-link"></i> Ссылка на просмотр (AniLibria/Kodik)</label>
          <input type="url" id="animeUrl" placeholder="https://...">
          <div class="form-hint">Если есть прямая ссылка на плеер</div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          <i class="fas fa-upload"></i> Загрузить аниме
        </button>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
